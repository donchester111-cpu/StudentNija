<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2766834653586662"
     crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentNija · Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0A111F 0%, #008751 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c3ff, #008751, #f4b400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .subtitle { color: rgba(255,255,255,0.4); font-size:14px; letter-spacing:2px; margin-bottom:32px; }
        .google-btn {
            width:100%; padding:16px; border-radius:60px; border:none; background:#fff; color:#333; font-size:16px; font-weight:600;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px;
            transition:transform 0.2s; box-shadow:0 4px 20px rgba(0,0,0,0.2);
        }
        .google-btn:hover { transform:scale(1.02); }
        .google-btn:active { transform:scale(0.97); }
        .status { margin-top:16px; font-size:14px; color:rgba(255,255,255,0.6); min-height:24px; }
        .status.success { color:#00c853; }
        .status.error { color:#ff5252; }
        .footer { margin-top:24px; font-size:12px; color:rgba(255,255,255,0.15); }
        .spinner {
            display:inline-block; width:20px; height:20px; border:2px solid rgba(255,255,255,0.2); border-top:2px solid #fff;
            border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">StudentNija</div>
        <div class="subtitle">Study Smarter · Score Higher</div>
        <button class="google-btn" id="googleBtn">
            <svg width="24" height="24" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign in with Google
        </button>
        <div class="status" id="status">Welcome back!</div>
        <div class="footer">⚡ secure · private · free</div>
    </div>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2766834653586662"
     crossorigin="anonymous"></script>

     style="display:block"

    <script>
        // ---------- CONFIG ----------
        const GOOGLE_CLIENT_ID = "738668428340-gpf3ctm26fkfpj441ra00ra1h65gelov.apps.googleusercontent.com";
        const APP_MAIN_URL = "https://studentnija.pages.dev/";
        const statusEl = document.getElementById('status');

        // ---------- Handle OAuth callback (hash) ----------
        (function handleOAuth() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token=')) {
                statusEl.innerHTML = '<span class="spinner"></span> Authenticating...';
                statusEl.className = 'status';

                const params = new URLSearchParams(hash.substring(1));
                const accessToken = params.get('access_token');

                if (accessToken) {
                    fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    })
                    .then(r => r.json())
                    .then(user => {
                        if (user.id) {
                            // Save user data to localStorage
                            const userData = {
                                name: user.name || user.given_name || 'Google User',
                                email: user.email,
                                picture: user.picture || '',
                                id: user.id
                            };
                            localStorage.setItem('studentnija_user', JSON.stringify(userData));
                            
                            statusEl.innerHTML = '✅ Login successful! Redirecting...';
                            statusEl.className = 'status success';
                            
                            // Redirect back to the main app
                            setTimeout(function() {
                                window.location.href = APP_MAIN_URL;
                            }, 800);
                        } else {
                            throw new Error('No user data');
                        }
                    })
                    .catch(err => {
                        statusEl.innerHTML = '❌ Error: ' + err.message;
                        statusEl.className = 'status error';
                    });
                }
            } else if (hash && hash.includes('error=')) {
                const error = new URLSearchParams(hash.substring(1)).get('error');
                statusEl.innerHTML = '❌ Authentication failed: ' + error;
                statusEl.className = 'status error';
            }
        })();

        // ---------- Google Sign-In Button ----------
        document.getElementById('googleBtn').addEventListener('click', function() {
            // Get the exact URL of this page (must match the redirect URI in Google Console)
            const baseUrl = window.location.href.split('?')[0].split('#')[0];
            const authUrl =
                "https://accounts.google.com/o/oauth2/v2/auth" +
                "?client_id=" + encodeURIComponent(GOOGLE_CLIENT_ID) +
                "&redirect_uri=" + encodeURIComponent(baseUrl) +
                "&response_type=token" +
                "&scope=" + encodeURIComponent("email profile") +
                "&prompt=select_account";
            window.location.href = authUrl;
        });
    </script>
</body>
</html>
